{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syntra | Run Hackathons Without Chaos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/syntra.css' %}">
  <style>
    /* ── Home-page specific styles ── */

    /* Nav */
    #site-header { transition: box-shadow 180ms ease, background-color 180ms ease; }
    #site-header.nav-scrolled { box-shadow: var(--shadow-md); }
    .nav-link { color: var(--text-soft); font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
    .nav-link:hover, .nav-link.active { color: var(--primary); }

    /* Mobile menu */
    .mobile-menu {
      position: fixed; inset: 0; z-index: 200;
      background-color: var(--bg-card);
      transform: translateX(100%);
      transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mobile-menu.open { transform: translateX(0); }

    /* Hero */
    .hero-section { padding: 80px 0 64px; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 12px; border-radius: 9999px;
      background-color: var(--primary-bg); border: 1px solid rgba(37,99,235,0.2);
      font-size: 0.75rem; font-weight: 500; color: var(--primary);
      margin-bottom: 20px;
    }
    .hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background-color: var(--primary); }
    .hero-title {
      font-family: var(--font-display); font-size: 3.25rem; font-weight: 800;
      line-height: 1.1; letter-spacing: -0.04em; color: var(--text-main);
      margin-bottom: 20px;
    }
    .hero-title span { color: var(--primary); }
    .hero-subtitle { font-size: 1.125rem; color: var(--text-soft); max-width: 500px; margin-bottom: 32px; line-height: 1.7; }
    .hero-stats { display: flex; gap: 32px; margin-bottom: 36px; }
    .hero-stat-item { display: flex; flex-direction: column; }
    .hero-stat-value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--text-main); }
    .hero-stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* Hero visual dashboard card */
    .hero-visual-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 20px;
      position: relative;
    }
    .hero-visual-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color);
    }
    .hero-visual-title { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--success); display: inline-block; margin-right: 6px; animation: livePulse 2s ease-in-out infinite; }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .hero-kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .hero-kpi-cell {
      background-color: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius); padding: 12px;
    }
    .hero-kpi-cell .kpi-label { font-size: 0.7rem; }
    .hero-kpi-cell .kpi-value { font-size: 1.5rem; }
    .hero-bar-cell {
      background-color: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius); padding: 12px;
    }
    .hero-bar-label { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
    .progress-bar { height: 6px; background-color: var(--border-color); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width: 84%; background-color: var(--primary); border-radius: 999px; }

    /* Section layout */
    .page-section { padding: 72px 0; border-top: 1px solid var(--border-color); }
    .section-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); margin-bottom: 8px; }
    .section-title { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--text-main); letter-spacing: -0.03em; margin-bottom: 12px; }
    .section-subtitle { font-size: 1rem; color: var(--text-soft); max-width: 520px; }

    /* Hackathon marquee cards */
    .hack-card {
      width: 280px; flex-shrink: 0;
      background-color: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm);
    }
    .hack-card-title { font-size: 0.875rem; font-weight: 600; color: var(--text-main); margin-bottom: 6px; }
    .hack-card-date { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 12px; }
    .hack-card-footer { display: flex; align-items: center; justify-content: space-between; }

    /* CTA banner */
    .cta-banner {
      background-color: var(--primary); border-radius: var(--radius-xl);
      padding: 48px; text-align: center; margin-top: 40px;
    }
    .cta-banner h2 { color: #fff; font-size: 1.75rem; margin-bottom: 8px; }
    .cta-banner p { color: rgba(255,255,255,0.8); margin-bottom: 24px; font-size: 1rem; }
    .btn-white { background-color: #fff; color: var(--primary); font-weight: 600; border: none; }
    .btn-white:hover { background-color: #f0f4ff; color: var(--primary-hover); }

    /* Problem / Solution */
    .problem-card {
      border: 1px solid rgba(220,38,38,0.2); border-radius: var(--radius-lg);
      background-color: var(--danger-bg); padding: 32px;
    }
    .solution-card {
      border: 1px solid rgba(22,163,74,0.2); border-radius: var(--radius-lg);
      background-color: var(--success-bg); padding: 32px;
    }
    .problem-card .card-section-tag { color: var(--danger); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .solution-card .card-section-tag { color: var(--success); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .problem-card h3, .solution-card h3 { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 20px; }
    .problem-item { background-color: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.15); border-radius: var(--radius); padding: 10px 14px; font-size: 0.875rem; color: var(--text-main); margin-bottom: 8px; }
    .solution-item { background-color: rgba(22,163,74,0.08); border: 1px solid rgba(22,163,74,0.15); border-radius: var(--radius); padding: 10px 14px; font-size: 0.875rem; color: var(--text-main); margin-bottom: 8px; }

    /* Timeline */
    .timeline-wrap { position: relative; padding-left: 24px; }
    .timeline-wrap::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background-color: var(--border-color); }
    .timeline-item { position: relative; margin-bottom: 32px; }
    .timeline-dot-outer {
      position: absolute; left: -31px; top: 16px;
      width: 14px; height: 14px; border-radius: 50%;
      background-color: var(--bg-card); border: 2px solid var(--primary);
    }
    .timeline-card {
      background-color: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .timeline-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-hover); }
    .timeline-date { font-size: 0.7rem; font-weight: 600; color: var(--primary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .timeline-name { font-size: 0.9375rem; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
    .timeline-desc { font-size: 0.8125rem; color: var(--text-soft); margin-bottom: 10px; }

    /* Feature cards */
    .feature-card {
      background-color: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm);
      opacity: 0; transform: translateY(12px);
      transition: opacity 300ms ease, transform 300ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }
    .feature-card.visible { opacity: 1; transform: translateY(0); }
    .feature-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-hover); }
    .feature-icon {
      width: 44px; height: 44px; border-radius: var(--radius);
      background-color: var(--primary-bg); border: 1px solid rgba(37,99,235,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); margin-bottom: 16px;
    }
    .feature-title { font-size: 0.875rem; font-weight: 600; color: var(--text-main); margin-bottom: 6px; }
    .feature-desc { font-size: 0.8125rem; color: var(--text-soft); line-height: 1.6; }

    /* Testimonials */
    .testimonial-card {
      width: 300px; flex-shrink: 0;
      background-color: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm);
    }
    .testimonial-quote { font-size: 0.875rem; color: var(--text-main); margin-bottom: 14px; line-height: 1.6; }
    .testimonial-author { display: flex; align-items: center; gap: 10px; }
    .testimonial-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background-color: var(--primary-bg); border: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; color: var(--primary);
    }
    .testimonial-meta { font-size: 0.75rem; color: var(--text-muted); }

    /* Footer */
    .home-footer { border-top: 1px solid var(--border-color); background-color: var(--bg-secondary); padding: 48px 0 32px; margin-top: 0; }
    .footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 48px; margin-bottom: 40px; }
    .footer-brand-name { font-family: var(--font-display); font-weight: 700; font-size: 1.125rem; color: var(--text-main); margin-bottom: 12px; }
    .footer-tagline { font-size: 0.875rem; color: var(--text-soft); line-height: 1.7; max-width: 320px; }
    .footer-heading { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-main); margin-bottom: 16px; }
    .footer-links { list-style: none; }
    .footer-links li { margin-bottom: 10px; }
    .footer-links a { font-size: 0.875rem; color: var(--text-soft); }
    .footer-links a:hover { color: var(--primary); }
    .social-btn {
      display: inline-flex; width: 36px; height: 36px;
      align-items: center; justify-content: center;
      border: 1px solid var(--border-color); border-radius: var(--radius);
      font-size: 0.75rem; font-weight: 600; color: var(--text-soft);
      background-color: var(--bg-card); transition: var(--transition);
    }
    .social-btn:hover { border-color: var(--primary); color: var(--primary); background-color: var(--primary-bg); }
    .footer-bottom { border-top: 1px solid var(--border-color); padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-size: 0.8125rem; color: var(--text-muted); }

    /* Scroll reveal */
    .scroll-reveal { opacity: 0; transform: translateY(16px); transition: opacity 400ms ease, transform 400ms ease; }
    .scroll-reveal.revealed { opacity: 1; transform: translateY(0); }

    /* Responsive */
    @media (max-width: 1024px) {
      .hero-title { font-size: 2.5rem; }
      .footer-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .hero-section { padding: 56px 0 40px; }
      .hero-title { font-size: 2rem; }
      .hero-stats { gap: 20px; }
      .hero-grid { grid-template-columns: 1fr; }
      .footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .problem-solution-grid { grid-template-columns: 1fr; }
      .features-grid { grid-template-columns: 1fr 1fr; }
      .cta-banner { padding: 32px 24px; }
    }
    @media (max-width: 480px) {
      .features-grid { grid-template-columns: 1fr; }
    }
  </style>
  <script src="{% static 'js/home.js' %}" defer></script>
</head>
<body class="home-wrapper">
